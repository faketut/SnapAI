<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snap.AI Display Client</title>
    <link rel="stylesheet" href="/static/mobile.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div id="connectionStatus">
                <span class="status-indicator status-disconnected"></span>
                SnapAI Mobile Client
            </div>
            <div id="lastActivity">Waiting for connection...</div>
        </div>
        
        <div id="aiResponse">
            <div class="ai-response-content empty-state">
                Waiting for AI response from overlay window...
                <br><br>
                Use F7 or F8 in the overlay to send queries.
            </div>
            <div class="timestamp" id="responseTimestamp"></div>
            <button id="refreshSyncBtn" class="refresh-button">Refresh Sync</button>
        </div>
    </div>

    <script>
        let ws = null;
        let reconnectAttempts = 0;
        let maxReconnectAttempts = 10;
        let reconnectDelay = 1000;
        let heartbeatInterval = null;
        let lastMessageTime = Date.now();
        
        const connectionStatus = document.getElementById('connectionStatus');
        const lastActivity = document.getElementById('lastActivity');
        const aiResponseContent = document.querySelector('.ai-response-content');
        const responseTimestamp = document.getElementById('responseTimestamp');
        const refreshSyncBtn = document.getElementById('refreshSyncBtn');
        
        // Store last response in localStorage for persistence
        const STORAGE_KEY = 'snapai_last_response';
        
        function updateConnectionStatus(connected, message) {
            const indicator = connectionStatus.querySelector('.status-indicator');
            if (connected) {
                indicator.className = 'status-indicator status-connected';
                connectionStatus.innerHTML = '<span class="status-indicator status-connected"></span>SnapAI Mobile Client';
            } else {
                indicator.className = 'status-indicator status-disconnected';
                connectionStatus.innerHTML = '<span class="status-indicator status-disconnected"></span>SnapAI Mobile Client';
            }
            lastActivity.textContent = message;
        }
        
        function updateLastActivity(message) {
            lastActivity.textContent = message + ' - ' + new Date().toLocaleTimeString();
        }
        
        function displayAIResponse(answer, timestamp) {
            aiResponseContent.textContent = answer;
            aiResponseContent.className = 'ai-response-content';
            responseTimestamp.textContent = 'Received: ' + new Date(timestamp).toLocaleString();
            updateLastActivity('AI Response received');
            
            // Store in localStorage for persistence
            const responseData = {
                answer: answer,
                timestamp: timestamp,
                receivedAt: Date.now()
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(responseData));
        }
        
        function loadStoredResponse() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    const data = JSON.parse(stored);
                    // Only show if less than 1 hour old
                    if (Date.now() - data.receivedAt < 3600000) {
                        displayAIResponse(data.answer, data.timestamp);
                        return true;
                    }
                }
            } catch (e) {
                console.error('Error loading stored response:', e);
            }
            return false;
        }
        
        function connect() {
            try {
                ws = new WebSocket('ws://' + window.location.hostname + ':8765');
                
                ws.onopen = () => {
                    console.log('WebSocket connected');
                    reconnectAttempts = 0;
                    reconnectDelay = 1000;
                    updateConnectionStatus(true, 'Connected to server');
                    startHeartbeat();
                };
                
                ws.onclose = (event) => {
                    console.log('WebSocket disconnected:', event.code, event.reason);
                    updateConnectionStatus(false, 'Disconnected from server');
                    stopHeartbeat();
                    attemptReconnect();
                };
                
                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    updateConnectionStatus(false, 'Connection error');
                };
                
                ws.onmessage = (event) => {
                    lastMessageTime = Date.now();
                    console.log('Received message:', event.data);
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'welcome') {
                        console.log('Server welcome:', data.message);
                        updateConnectionStatus(true, 'Connected to server');
                    } else if (data.type === 'ai_response') {
                        console.log('AI Response received:', data.answer);
                        displayAIResponse(data.answer, data.timestamp);
                    } else if (data.type === 'sync_response') {
                        console.log('Sync response received:', data.answer);
                        if (data.answer && data.answer.trim() !== '') {
                            displayAIResponse(data.answer, data.timestamp);
                            updateLastActivity('Synced from overlay');
                        } else {
                            updateLastActivity('No content in overlay to sync');
                        }
                    } else if (data.type === 'error') {
                        console.error('Server error:', data.message);
                        updateLastActivity('Error: ' + data.message);
                    } else if (data.type === 'pong') {
                        console.log('Heartbeat pong received');
                    } else {
                        console.log('Other message type:', data.type);
                        updateLastActivity('Message received');
                    }
                };
            } catch (error) {
                console.error('Failed to create WebSocket:', error);
                updateConnectionStatus(false, 'Connection failed');
                attemptReconnect();
            }
        }
        
        function startHeartbeat() {
            stopHeartbeat();
            heartbeatInterval = setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({command: 'ping'}));
                }
            }, 30000); // Send ping every 30 seconds
        }
        
        function stopHeartbeat() {
            if (heartbeatInterval) {
                clearInterval(heartbeatInterval);
                heartbeatInterval = null;
            }
        }
        
        function attemptReconnect() {
            if (reconnectAttempts >= maxReconnectAttempts) {
                console.log('Max reconnection attempts reached');
                updateLastActivity('Max reconnection attempts reached');
                return;
            }
            
            reconnectAttempts++;
            const delay = Math.min(reconnectDelay * Math.pow(2, reconnectAttempts - 1), 30000);
            
            console.log(`Attempting to reconnect in ${delay}ms (attempt ${reconnectAttempts}/${maxReconnectAttempts})`);
            updateLastActivity(`Reconnecting in ${Math.round(delay/1000)}s (attempt ${reconnectAttempts}/${maxReconnectAttempts})`);
            
            setTimeout(() => {
                if (ws && ws.readyState === WebSocket.CLOSED) {
                    connect();
                }
            }, delay);
        }
        
        function checkConnectionHealth() {
            const now = Date.now();
            const timeSinceLastMessage = now - lastMessageTime;
            
            // If no message received for 2 minutes, try to reconnect
            if (timeSinceLastMessage > 120000 && ws && ws.readyState === WebSocket.OPEN) {
                console.log('No messages received for 2 minutes, reconnecting...');
                ws.close();
            }
        }
        
        function refreshSync() {
            console.log('Manual sync requested');
            refreshSyncBtn.disabled = true;
            refreshSyncBtn.textContent = 'Syncing...';
            
            // Try to reconnect if disconnected
            if (!ws || ws.readyState === WebSocket.CLOSED) {
                console.log('Reconnecting for manual sync...');
                reconnectAttempts = 0; // Reset attempts for manual refresh
                connect();
            } else if (ws.readyState === WebSocket.OPEN) {
                // Send sync request to get current overlay content
                console.log('Requesting sync from overlay...');
                ws.send(JSON.stringify({
                    command: 'sync_request',
                    timestamp: new Date().toISOString()
                }));
            }
            
            // Re-enable button after 5 seconds
            setTimeout(() => {
                refreshSyncBtn.disabled = false;
                refreshSyncBtn.textContent = 'Refresh Sync';
            }, 5000);
            
            updateLastActivity('Sync requested from overlay');
        }
        
        // Initialize
        function init() {
            // Load any stored response first
            if (!loadStoredResponse()) {
                updateLastActivity('Waiting for connection...');
            }
            
            // Connect to WebSocket
            connect();
            
            // Check connection health every minute
            setInterval(checkConnectionHealth, 60000);
            
            // Add refresh button event listener
            refreshSyncBtn.addEventListener('click', refreshSync);
        }
        
        // Start the application
        init();
    </script>
</body>
</html>
