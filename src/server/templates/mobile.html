<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapAI Mobile</title>
    <style>
        :root {
            --bg: #0d1117;
            --bg-elevated: #111827;
            --border-subtle: #1f2933;
            --border-strong: #374151;
            --text-main: #e5e7eb;
            --text-muted: #9ca3af;
            --accent: #22d3ee; /* neon cyan accent */
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            flex-direction: column;
        }

        .page {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 640px;
            margin: 0 auto;
            padding: 16px 16px 12px;
            gap: 12px;
        }

        .header {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .title {
            font-size: 18px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-main);
        }

        .status {
            font-size: 13px;
            color: var(--text-muted);
        }

        .answer-shell {
            flex: 1;
            display: flex;
            border-radius: 10px;
            border: 1px solid var(--border-subtle);
            background: radial-gradient(circle at top left, #111827 0, #020617 55%);
            padding: 12px;
        }

        .answer-scroll {
            width: 100%;
            overflow-y: auto;
            padding-right: 4px;
        }

        #answer {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-main);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }

        .btn {
            flex: 1;
            border-radius: 9999px;
            border: 1px solid var(--border-strong);
            background-color: #020617;
            color: var(--text-main);
            padding: 12px 14px;
            font-size: 14px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.18s ease, border-color 0.18s ease, color 0.18s ease, transform 0.06s ease;
        }

        .btn-primary {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }
    </style>
</head>

<body>
    <div class="page">
        <header class="header">
            <div class="title">SNAPAI MOBILE</div>
            <div id="status" class="status">connecting...</div>
        </header>

        <section class="answer-shell">
            <div class="answer-scroll">
                <div id="answer">waiting for ai response...</div>
            </div>
        </section>

        <div class="actions">
            <button id="captureBtn" class="btn btn-primary">screenshot</button>
            <button id="syncBtn" class="btn">sync</button>
        </div>
    </div>

    <script>
        let ws;
        const statusEl = document.getElementById('status');
        const answerEl = document.getElementById('answer');
        const captureBtn = document.getElementById('captureBtn');
        const syncBtn = document.getElementById('syncBtn');

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.hostname}:8765`;

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                statusEl.innerText = 'Connected to SnapAI PC';
                statusEl.style.color = '#3fb950';
                ws.send(jsonStr({ command: 'sync_request' }));
            };

            ws.onclose = () => {
                statusEl.innerText = 'Disconnected. Retrying...';
                statusEl.style.color = '#f85149';
                setTimeout(connect, 3000);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'ai_response' || data.type === 'sync_response') {
                    if (data.answer) {
                        answerEl.innerText = data.answer;
                    }
                }
            };
        }

        function jsonStr(obj) { return JSON.stringify(obj); }

        captureBtn.onclick = () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(jsonStr({ command: 'screenshot_request' }));
                statusEl.innerText = 'Screenshot requested...';
            }
        };

        syncBtn.onclick = () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(jsonStr({ command: 'sync_request' }));
            }
        };

        connect();
    </script>
</body>

</html>
