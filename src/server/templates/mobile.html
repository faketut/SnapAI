<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapAI Mobile</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: #58a6ff;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .status {
            font-size: 14px;
            margin-bottom: 20px;
            color: #8b949e;
        }

        .answer-container {
            width: 100%;
            max-width: 500px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            min-height: 100px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .controls {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 500px;
        }

        button {
            flex: 1;
            background-color: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:active {
            background-color: #2ea043;
        }

        button#syncBtn {
            background-color: #21262d;
            border: 1px solid #30363d;
        }

        button#captureBtn {
            background-color: #58a6ff;
        }

        button#captureBtn:active {
            background-color: #1f6feb;
        }
    </style>
</head>

<body>
    <h1>SnapAI Sync</h1>
    <div id="status" class="status">Connecting...</div>

    <div id="answer" class="answer-container">Waiting for AI response...</div>

    <div class="controls">
        <button id="captureBtn">📸 TAKE SCREENSHOT</button>
        <button id="syncBtn">🔄 SYNC</button>
    </div>

    <script>
        let ws;
        const statusEl = document.getElementById('status');
        const answerEl = document.getElementById('answer');
        const captureBtn = document.getElementById('captureBtn');
        const syncBtn = document.getElementById('syncBtn');

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.hostname}:8765`;

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                statusEl.innerText = 'Connected to SnapAI PC';
                statusEl.style.color = '#3fb950';
                ws.send(jsonStr({ command: 'sync_request' }));
            };

            ws.onclose = () => {
                statusEl.innerText = 'Disconnected. Retrying...';
                statusEl.style.color = '#f85149';
                setTimeout(connect, 3000);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'ai_response' || data.type === 'sync_response') {
                    if (data.answer) {
                        answerEl.innerText = data.answer;
                    }
                }
            };
        }

        function jsonStr(obj) { return JSON.stringify(obj); }

        captureBtn.onclick = () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(jsonStr({ command: 'screenshot_request' }));
                statusEl.innerText = 'Screenshot requested...';
            }
        };

        syncBtn.onclick = () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(jsonStr({ command: 'sync_request' }));
            }
        };

        connect();
    </script>
</body>

</html>
